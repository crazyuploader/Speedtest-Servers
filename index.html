<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="crazyuploader" />
    <meta
      name="description"
      content="Explore and analyze Speedtest servers worldwide. Filter by ISP, country, or location, and visualize server distribution on an interactive map."
    />
    <meta
      name="keywords"
      content="Speedtest, Speedtest.net, Internet Speed, Servers, ISP, Network Map, Server Explorer, Latency, IPv6, Server Visualization, Speedtest Dashboard"
    />
    <title>Speedtest Servers Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div id="spinner" class="spinner-overlay hidden">
      <div class="spinner-ring"></div>
    </div>

    <div id="ip-tooltip"></div>

    <header class="site-header">
      <div class="header-inner">
        <div class="flex items-center gap-3">
          <div>
            <h1 class="site-title">
              Speedtest <span class="text-accent">Servers</span><span class="title-cursor">_</span>
            </h1>
            <p class="site-subtitle">Server Explorer &amp; Analytics</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <a
            href="https://github.com/crazyuploader/Speedtest-Servers"
            target="_blank"
            rel="noopener noreferrer"
            class="header-action-btn"
            aria-label="View on GitHub"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
          </a>
          <button
            id="darkModeToggle"
            aria-label="Toggle theme"
            class="header-action-btn theme-toggle"
          >
            <span id="darkModeIcon">
              <i data-lucide="moon" class="w-5 h-5 moon-icon"></i>
              <i data-lucide="sun" class="w-5 h-5 sun-icon"></i>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div id="metadata" class="stats-grid"></div>

        <div class="filters-bar">
          <div class="filter-group">
            <label for="provider" class="filter-label">ISP / Network</label>
            <div class="select-wrapper">
              <select id="provider" class="filter-select"></select>
              <i data-lucide="chevron-down" class="select-arrow"></i>
            </div>
          </div>

          <div class="filter-group">
            <label for="countryFilter" class="filter-label">Country</label>
            <div class="select-wrapper">
              <select id="countryFilter" class="filter-select">
                <option value="">All Countries</option>
              </select>
              <i data-lucide="chevron-down" class="select-arrow"></i>
            </div>
          </div>

          <div class="filter-group search-group">
            <label for="searchServers" class="filter-label">Search</label>
            <div class="search-wrapper">
              <i data-lucide="search" class="search-icon"></i>
              <input
                type="text"
                id="searchServers"
                placeholder='Name, host, ID… ("quoted" for exact)'
                class="filter-search"
              />
            </div>
          </div>

          <div class="filter-group export-group">
            <label class="filter-label">&nbsp;</label>
            <button id="exportJsonButton" class="btn-export">
              <i data-lucide="download" class="w-4 h-4"></i>
              Export JSON
            </button>
          </div>
        </div>

        <div class="map-section">
          <div id="map"></div>
        </div>

        <div class="table-section">
          <div class="table-header-bar" id="tableHeaderBar">
            <span class="table-title">Server List</span>
            <span class="server-count-badge" id="serverCountBadge"
              >0 servers</span
            >
          </div>
          <div class="table-container" id="tableContainer">
            <table id="servers">
              <thead>
                <tr>
                  <th scope="col" class="col-index">#</th>
                  <th scope="col" class="col-sortable" data-sort="name">
                    City <span class="sort-icon">⇅</span>
                  </th>
                  <th scope="col" class="col-sortable" data-sort="country">
                    Country <span class="sort-icon">⇅</span>
                  </th>
                  <th scope="col" class="col-sortable" data-sort="sponsor">
                    Sponsor <span class="sort-icon">⇅</span>
                  </th>
                  <th scope="col" class="col-sortable" data-sort="id">
                    Server ID <span class="sort-icon">⇅</span>
                  </th>
                  <th
                    scope="col"
                    class="col-sortable"
                    data-sort="https_functional"
                  >
                    HTTPS <span class="sort-icon">⇅</span>
                  </th>
                  <th scope="col" class="col-sortable" data-sort="ipv6_capable">
                    IPv6 <span class="sort-icon">⇅</span>
                  </th>
                  <th scope="col" class="col-sortable" data-sort="hostname">
                    Host <span class="sort-icon">⇅</span>
                  </th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="scroll-hint" class="scroll-hint">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Scroll horizontally to view all columns
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>
          &copy; <span id="year"></span> Speedtest Servers Dashboard. Built by
          <a
            href="https://github.com/crazyuploader"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
            >crazyuploader</a
          >.
        </p>
        <a
          href="https://github.com/crazyuploader/Speedtest-Servers"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-github"
        >
          <i data-lucide="github" class="w-4 h-4"></i>
          Source
        </a>
      </div>
    </footer>

    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
      defer
    ></script>
    <script src="static/script.js" defer></script>
  </body>
</html>
